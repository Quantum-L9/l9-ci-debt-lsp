name: LSP-P5 Final Telemetry

on:
pull_request:
push:
branches:
- main

permissions:
contents: read

jobs:
final-telemetry:
runs-on: ubuntu-latest
timeout-minutes: 20

steps:
  - name: Checkout
    uses: actions/checkout@v4
  - name: Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: pip
  - name: Install
    run: |
      python -m pip install --upgrade pip
      python -m pip install -e '.[dev]'
  - name: Validate schemas
    run: |
      python - <<'PY'
      import json
      from pathlib import Path
      from jsonschema import Draft202012Validator
      for path in sorted(Path("schemas/lsp").glob("*.json")):
          schema = json.loads(path.read_text(encoding="utf-8"))
          Draft202012Validator.check_schema(schema)
          print(path)
      PY
  - name: Telemetry tests
    run: pytest tests/telemetry
  - name: Privacy tests
    run: pytest tests/privacy
  - name: Resilience tests
    run: pytest tests/resilience
  - name: Security tests
    run: pytest tests/security
  - name: Architecture tests
    run: pytest tests/architecture
  - name: Diagnostics and actions
    run: |
      pytest \
        tests/diagnostics \
        tests/publication \
        tests/actions
  - name: Incremental runtime
    run: |
      pytest \
        tests/analysis \
        tests/concurrency \
        tests/performance \
        tests/runtime
  - name: Full test suite
    run: |
      pytest \
        --cov=l9_debt_lsp \
        --cov-report=term-missing \
        --cov-fail-under=85
  - name: Ruff
    run: ruff check .
  - name: Mypy
    run: mypy src
  - name: Final capabilities
    run: l9-debt-lsp-contracts capabilities
  - name: Telemetry health
    run: |
      export L9_DEBT_LSP_STATE_ROOT="${RUNNER_TEMP}/l9-state"
      l9-debt-lsp-contracts telemetry-health

