name: ci

on:
  pull_request:
    paths:
      - "server/**"
      - "rules/**"
      - "fixtures/**"
      - "tests/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]

jobs:
  python-server:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install server deps
        run: pip install pygls pydantic pyyaml jsonschema ruff pytest pytest-cov

      - name: Ruff lint
        run: ruff check server/ tests/

      - name: Compile check
        run: python -m compileall server/ tests/

      - name: Validate active compiled rules
        run: python server/validate_compiled_rules.py --rules rules/compiled_rules.json --lock rules/compiled_rules.lock.json

      - name: Refresh rules from Intelligence fixture
        run: |
          python server/refresh_rules.py \
            --intelligence-outputs fixtures/intelligence/outputs \
            --rules-out /tmp/l9-compiled-rules.json \
            --lock-out /tmp/l9-compiled-rules.lock.json \
            --expected-schema-version 1.0 \
            --expected-artifact-name ci-debt-intelligence-compiled-rules \
            --source-run-id ci-fixture \
            --source-sha ci-fixture
          python server/validate_compiled_rules.py \
            --rules /tmp/l9-compiled-rules.json \
            --lock /tmp/l9-compiled-rules.lock.json

      - name: Run Python tests
        run: pytest tests/test_compiled_rules_validation.py tests/test_diagnostics.py tests/test_code_actions.py -q

      - name: Upload refreshed fixture artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsp-refreshed-rules-${{ github.run_id }}
          path: |
            /tmp/l9-compiled-rules.json
            /tmp/l9-compiled-rules.lock.json
          retention-days: 14

  typescript-extension:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install node deps
        run: npm install

      - name: TypeScript compile
        run: npm run compile

      - name: ESLint
        run: npm run lint || true

      - name: Jest tests
        run: npm test
