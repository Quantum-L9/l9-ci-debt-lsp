name: LSP-P2 Incremental Analysis

on:
pull_request:
push:
branches:
- main

permissions:
contents: read

jobs:
incremental-analysis:
runs-on: ubuntu-latest
timeout-minutes: 15

steps:
  - name: Checkout
    uses: actions/checkout@v4
  - name: Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: pip
  - name: Install
    run: |
      python -m pip install --upgrade pip
      python -m pip install -e '.[dev]'
  - name: Validate schemas
    run: |
      python - <<'PY'
      import json
      from pathlib import Path
      from jsonschema import Draft202012Validator
      for path in sorted(Path("schemas/lsp").glob("*.json")):
          schema = json.loads(path.read_text(encoding="utf-8"))
          Draft202012Validator.check_schema(schema)
          print(path)
      PY
  - name: Incremental-analysis tests
    run: pytest tests/analysis
  - name: Concurrency tests
    run: pytest tests/concurrency
  - name: Performance-contract tests
    run: pytest tests/performance
  - name: Runtime tests
    run: pytest tests/runtime
  - name: Security tests
    run: pytest tests/security
  - name: Architecture tests
    run: pytest tests/architecture
  - name: Full test suite
    run: |
      pytest \
        --cov=l9_debt_lsp \
        --cov-report=term-missing \
        --cov-fail-under=80
  - name: Ruff
    run: ruff check .
  - name: Mypy
    run: mypy src
  - name: Capabilities
    run: l9-debt-lsp-contracts capabilities

