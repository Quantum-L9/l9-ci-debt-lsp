name: LSP-P1 Pack Protocol
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  pack-protocol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Validate schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          for path in sorted(Path("schemas/lsp").glob("*.json")):
              schema = json.loads(path.read_text(encoding="utf-8"))
              Draft202012Validator.check_schema(schema)
              print(path)
          PY
      - name: Security tests
        run: pytest tests/security
      - name: Pack tests
        run: pytest tests/packs
      - name: Runtime tests
        run: pytest tests/runtime
      - name: Architecture tests
        run: pytest tests/architecture
      - name: Contract tests
        run: pytest tests/contracts
      - name: Full test suite
        run: pytest --cov=l9_debt_lsp --cov-report=term-missing
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Capabilities
        run: l9-debt-lsp-contracts capabilities
