name: publish-extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      pre_release:
        description: "Publish as pre-release"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install node deps
        run: npm ci

      - name: Install server deps
        run: pip install pygls pydantic pyyaml jsonschema ruff pytest

      - name: Run all tests
        run: |
          pytest tests/test_diagnostics.py tests/test_code_actions.py tests/test_rule_compilation.py -q
          npm test

      - name: TypeScript compile
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: l9-ci-debt-lsp-${{ github.ref_name }}.vsix
          path: "*.vsix"
          retention-days: 90

      - name: Publish to VS Code Marketplace
        if: ${{ !github.event.inputs.pre_release }}
        run: npx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish pre-release
        if: ${{ github.event.inputs.pre_release == 'true' }}
        run: npx @vscode/vsce publish --pre-release --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
