name: LSP-P0 Boundary

on:
pull_request:
push:
branches:
- main

permissions:
contents: read

jobs:
python:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4
  - name: Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: pip
  - name: Install
    run: |
      python -m pip install --upgrade pip
      python -m pip install -e '.[dev]'
  - name: Architecture tests
    run: |
      pytest tests/architecture
  - name: Contract tests
    run: |
      pytest tests/contracts
  - name: Runtime tests
    run: |
      pytest tests/runtime
  - name: Ruff
    run: |
      ruff check .
  - name: Mypy
    run: |
      mypy src
  - name: Capabilities
    run: |
      l9-debt-lsp-contracts capabilities
  - name: Compatibility smoke test
    run: |
      l9-debt-lsp-contracts evaluate-compatibility \
        --defense-pack tests/fixtures/packs/compatible-defense-pack.json \
        --compatibility tests/fixtures/packs/compatible-defense-pack.json \
        --platform linux-x86_64

vscode:
runs-on: ubuntu-latest

defaults:
  run:
    working-directory: vscode
steps:
  - name: Checkout
    uses: actions/checkout@v4
  - name: Node
    uses: actions/setup-node@v4
    with:
      node-version: "22"
      cache: npm
      cache-dependency-path: vscode/package-lock.json
  - name: Install
    run: npm install
  - name: Type check
    run: npm run check
  - name: Compile
    run: npm run compile

