# Message templates for L9 CI-debt LSP diagnostics.
# These are the canonical human-readable messages for each rule.
# Source of truth for rule IDs:
#   cryptoxdog/l9-ci-debt-resolver/references/classification-rules.md
# Compiled rules consume these via corpus_compiler.py.

templates:
  CI-IMPORT-001:
    short: "GHA job missing PYTHONPATH env var"
    full: >
      CI-IMPORT-001: GHA job is missing `env: PYTHONPATH: ${{ github.workspace }}`.
      Without this, Python imports fail with ModuleNotFoundError in CI even when
      tests pass locally. Apply to every job that runs Python.
    fix_label: "Add PYTHONPATH env var to this job"
    docs_anchor: "#p-001-pythonpath-missing-in-ci-job"
    severity: error
    topology: gha_workflow

  CI-DEPS-001:
    short: "pyproject.toml missing [project.dependencies]"
    full: >
      CI-DEPS-001: pyproject.toml has a [project] section but no [project.dependencies].
      Runtime dependencies (e.g. pydantic>=2.0) must be declared here so CI
      install steps pick them up. Missing deps cause ModuleNotFoundError at runtime.
    fix_label: "Add [project.dependencies] section"
    docs_anchor: "#p-002-runtime-dependency-missing-from-pyprojecttoml"
    severity: warning
    topology: python_deps

  CI-DEPS-002:
    short: "Final Decision / aggregate job missing install step"
    full: >
      CI-DEPS-002: A Final Decision or aggregate GHA job runs Python but has no
      `pip install` / `uv sync` / `npm ci` step. Sibling jobs have install steps;
      this job is the only one missing it. Add an Install deps step immediately
      after the checkout step.
    fix_label: "Add Install deps step to this job"
    docs_anchor: "#p-003-ci-job-missing-install-step"
    severity: error
    topology: gha_workflow

  API-DRIFT-001:
    short: "ReviewReport missing suggested_tests field"
    full: >
      API-DRIFT-001: The ReviewReport class does not define a `suggested_tests` field.
      Downstream importers expect `SuggestedTest` dataclass and
      `suggested_tests: list[SuggestedTest]`. Missing field causes ImportError
      and test collection failure in CI.
    fix_label: null
    docs_anchor: "#p-004-source-file-missing-exported-symbol"
    severity: error
    topology: api_drift

  DOCTRINE:
    short: "PacketEnvelope is not the active transport type"
    full: >
      DOCTRINE: `PacketEnvelope` is referenced as an active transport type.
      L9 doctrine mandates TransportPacket-only wire format. This is a
      doctrine violation — do not patch by weakening the check.
      Resolution: (a) rewrite to TransportPacket-native, or
      (b) ship a compat adapter in a separate PR with an ADR amendment.
    fix_label: null
    docs_anchor: "#doctrine-violation-response"
    severity: error
    topology: doctrine_violation
