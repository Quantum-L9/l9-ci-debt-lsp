# L9 CI-debt LSP — pre-commit config
# Enforces Gate A (compileall) + Gate B (ruff) locally before every commit.
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        files: \.ya?ml$
      - id: check-json
        files: \.json$
      - id: check-toml
        files: \.toml$
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: compileall
        name: python-compileall
        language: system
        entry: python -m compileall -q .
        pass_filenames: false
        types: [python]

      - id: l9-rule-validation
        name: l9-validate-compiled-rules
        language: system
        entry: python -c "import json, sys; data=json.load(open('rules/compiled_rules.json')); rules=data.get('rules', []); [sys.exit(1) or print(f'MISSING id in rule {i}') for i, r in enumerate(rules) if 'id' not in r]"
        pass_filenames: false
        files: rules/compiled_rules\.json
